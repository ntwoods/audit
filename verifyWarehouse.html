<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Verify Mismatch Found in Audit</title>
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-6xl mx-auto p-6">
    <header class="mb-6">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-3xl font-semibold text-blue-700">Verify Audits</h1>
          <p class="text-sm text-gray-600 mt-1">Review errors found in audits and submit reviews.</p>
        </div>
        <div>
          <button id="refreshBtn" class="px-3 py-2 rounded bg-blue-600 text-white hover:opacity-95">Refresh</button>
        </div>
      </div>
    </header>

    <main>
      <section id="summary" class="mb-4 text-sm text-gray-600"></section>

      <div id="cardsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <!-- Cards injected here -->
      </div>

      <div id="emptyState" class="hidden mt-8 text-center text-gray-500">
        <div class="text-lg">No pending audits for today.</div>
      </div>
    </main>
  </div>

  <!-- Modal container -->
  <div id="modalRoot"></div>

  <!-- Toast container -->
  <div id="toastRoot" class="fixed bottom-6 right-6 space-y-2"></div>

  <!-- Scripts -->
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/uploader.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/startAudit.js"></script>
</body>
</html>
